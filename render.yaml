services:
  - type: web
    name: calmsite-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: calmsite-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: USE_SQLITE
        value: "False"
      - key: ALLOWED_HOSTS
        value: "calmsite-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://YOUR_VERCEL_DOMAIN"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://YOUR_VERCEL_DOMAIN"
      - key: USE_S3_STORAGE
        value: "True"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_REGION_NAME
        value: "us-east-1"
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false

databases:
  - name: calmsite-db
    databaseName: calmsite
    user: calmsite
    plan: free
